name: Atelier

# rule driven multi platform flake build
# discover evaluates the flake with the atelier tool and emits a chunked matrix
# build fans out one cell per drv onto a native runner via a reusable workflow
# skip posts a skipped check for broken or unsupported platform attrs
# gate is the single stable check for branch protection

on:
  workflow_dispatch:
    inputs:
      rules:
        description: Rule file path
        type: string
        default: atelier.toml
      x86_64-linux:
        description: Build on x86_64-linux
        type: boolean
        default: true
      aarch64-linux:
        description: Build on aarch64-linux
        type: boolean
        default: true
      aarch64-darwin:
        description: Build on aarch64-darwin
        type: boolean
        default: true
      attr:
        description: Restrict to attrs matching this glob, empty means all
        type: string
        default: ""
      push:
        description: Push results to the binary cache
        type: boolean
        default: false
      workers:
        description: Eval workers; each may use ~4 GiB, keep workers x 4 GiB under runner RAM
        type: number
        default: 2
      install-command:
        description: Shell command that installs Nix; empty uses the built-in installer
        type: string
        default: ""
      extra-conf:
        description: Extra nix.conf lines appended after the required settings
        type: string
        default: ""
  # downstream repos consume atelier by calling this workflow; the inputs mirror
  # workflow_dispatch so the generate step reads them the same way
  workflow_call:
    inputs:
      rules:
        description: Rule file path
        type: string
        default: atelier.toml
      x86_64-linux:
        description: Build on x86_64-linux
        type: boolean
        default: true
      aarch64-linux:
        description: Build on aarch64-linux
        type: boolean
        default: true
      aarch64-darwin:
        description: Build on aarch64-darwin
        type: boolean
        default: true
      attr:
        description: Restrict to attrs matching this glob, empty means all
        type: string
        default: ""
      push:
        description: Push results to the binary cache
        type: boolean
        default: false
      tool:
        description: Atelier tool flake ref a caller runs, the published flake
        type: string
        default: github:stepbrobd/atelier#
      workers:
        description: Eval workers; each may use ~4 GiB, keep workers x 4 GiB under runner RAM
        type: number
        default: 2
      install-command:
        description: Shell command that installs Nix; empty uses the built-in installer
        type: string
        default: ""
      extra-conf:
        description: Extra nix.conf lines appended after the required settings
        type: string
        default: ""
    secrets:
      ATTIC_TOKEN:
        required: false
      CACHIX_AUTH_TOKEN:
        required: false
      CACHIX_SIGNING_KEY:
        required: false
      NIKS3_TOKEN:
        required: false

permissions:
  contents: read

concurrency:
  group: atelier-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Discover:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.gen.outputs.chunks }}
      skipped: ${{ steps.gen.outputs.skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set Up Nix
        # full ref, not ./, so the action resolves when a downstream repo is the
        # checkout; ./ would look in the caller and fail
        uses: stepbrobd/atelier/.github/actions/atelier@master
        with:
          system: x86_64-linux
          reclaim: "false"
          install-command: ${{ inputs.install-command }}
          extra-conf: ${{ inputs.extra-conf }}
          # the rule file drives the pull cache (its substituters + trusted-public-
          # keys), injected into nix.conf so every nix install can substitute it
          rules: ${{ inputs.rules }}

      - name: Generate Matrix
        id: gen
        shell: bash
        env:
          RULES: ${{ inputs.rules }}
          ATTR: ${{ inputs.attr }}
          # empty on atelier's own ci so it falls back to the local flake (.#),
          # set to the published flake when a downstream repo calls this workflow
          TOOL: ${{ inputs.tool }}
          # nix-eval-jobs uses up to ~4 GiB per worker, so the aggregate
          # (workers x 4 GiB) must fit the runner; a low count keeps heavy
          # config toplevel evals from OOM-killing the whole runner
          WORKERS: ${{ inputs.workers }}
          ON_X8664_LINUX: ${{ inputs.x86_64-linux }}
          ON_AARCH64_LINUX: ${{ inputs.aarch64-linux }}
          ON_AARCH64_DARWIN: ${{ inputs.aarch64-darwin }}
        run: |
          set -euo pipefail
          systems=""
          [ "${ON_X8664_LINUX:-true}" != "false" ] && systems="${systems:+$systems,}x86_64-linux"
          [ "${ON_AARCH64_LINUX:-true}" != "false" ] && systems="${systems:+$systems,}aarch64-linux"
          [ "${ON_AARCH64_DARWIN:-true}" != "false" ] && systems="${systems:+$systems,}aarch64-darwin"

          # on push and pull_request the toggles are empty so systems holds all
          # three, an empty systems here means a dispatch unchecked every system
          # so build nothing rather than letting the tool read empty as all
          if [ -z "$systems" ]; then
            echo "::notice::All systems disabled, nothing to build"
            { echo "chunks=[]"; echo "skipped=[]"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          nix run "${TOOL:-.#}" -- discover --rules "$RULES" --flake . --systems "$systems" --attr "$ATTR" --workers "${WORKERS:-2}"

  Build:
    needs: Discover
    if: ${{ needs.Discover.outputs.chunks != '' && needs.Discover.outputs.chunks != '[]' }}
    # carry id-token down to build.yaml for the niks3 oidc push; a callee cannot
    # raise it, so the top-level contents:read would otherwise strip it here
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.Discover.outputs.chunks) }}
    name: ${{ matrix.name }}
    # ./ resolves to atelier at this workflow's commit even for downstream
    # callers (unlike a local action ref), so it stays relative
    uses: ./.github/workflows/build.yaml
    with:
      cells: ${{ matrix.cells }}
      push: ${{ inputs.push }}
      rules: ${{ inputs.rules }}
      install-command: ${{ inputs.install-command }}
      extra-conf: ${{ inputs.extra-conf }}
    secrets:
      ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      CACHIX_SIGNING_KEY: ${{ secrets.CACHIX_SIGNING_KEY }}
      NIKS3_TOKEN: ${{ secrets.NIKS3_TOKEN }}

  Skip:
    needs: Discover
    if: ${{ needs.Discover.outputs.skipped != '' && needs.Discover.outputs.skipped != '[]' && github.event.pull_request.head.repo.fork != true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Post Skipped Checks
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SKIPPED: ${{ needs.Discover.outputs.skipped }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          # a skipped check is posted through the rest api, so github prefixes it with
          # only the workflow name. a native build cell instead carries its full job
          # path "<caller> / Build / <attr>", where <caller> is the name a downstream
          # repo gives the `uses:` call (empty when atelier runs as its own top-level
          # workflow). to line the two up across any consumer, recover <caller> from the
          # Discover job's check run (Skip needs Discover, so it has completed and its
          # check run exists) and drop the "Discover" leaf. listing check runs needs only
          # checks:read, already implied by this job's checks:write, so no consumer has to
          # grant anything. on any failure the prefix stays empty, i.e. the historical
          # "<workflow> / Build / <attr>" rendering, so this cannot regress.
          prefix="$(gh api --paginate "repos/${REPO}/commits/${SHA}/check-runs" \
            --jq '.check_runs[] | select(.app.slug == "github-actions") | .name
                  | select((. == "Discover" or endswith(" / Discover")) and (contains("Build / ") | not))' \
            2>/dev/null | head -n1 || true)"
          prefix="${prefix%Discover}"

          printf '%s' "$SKIPPED" | jq -c '.[]' | while read -r row; do
            # name it "<caller> / Build / <attr>" so github's workflow-name prefix yields
            # "<workflow> / <caller> / Build / <attr>", identical to the native build cells
            # (an empty <caller> collapses to the "Build / <attr>" used on atelier's own ci)
            jq -nc \
              --arg prefix "$prefix" \
              --arg name "$(printf '%s' "$row" | jq -r '.label')" \
              --arg sha "$SHA" \
              --arg reason "$(printf '%s' "$row" | jq -r '.reason')" \
              --arg url "$RUN_URL" \
              '{name: ($prefix + "Build / " + $name), head_sha: $sha, status: "completed", conclusion: "skipped",
                details_url: $url, output: {title: $reason, summary: $reason}}' \
            | gh api "repos/${REPO}/check-runs" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                --method POST --input - >/dev/null \
            || echo "::warning::Failed to post skipped check"
          done

  Gate:
    needs: Build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require Builds
        shell: bash
        env:
          RESULT: ${{ needs.Build.result }}
        run: |
          echo "build result ${RESULT}"
          # skipped means the matrix was empty which is a pass
          [ "$RESULT" = success ] || [ "$RESULT" = skipped ]
